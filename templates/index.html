<!DOCTYPE html>
<html>
<head>
    <title>Pogoda</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function toggleButton() {
            const cityName = document.getElementById("cityInput");
            console.log(cityName);
            const countryID = document.getElementById("countryCode");
            const submitButton = document.getElementById("submitButton");
            submitButton.disabled = cityName.value.trim() === "" || countryID.value.trim() === "";
        }
    </script>
</head>
<body>

<form method="post">
    <input id="cityInput" name="city" onkeyup= "toggleButton()" placeholder="Miasto">
    <input id="countryCode" name="country" onkeyup= "toggleButton()" minlength="2" maxlength="2" placeholder="PL">
    <button id="submitButton" disabled type="submit">Pobierz pogodę</button>
</form>

<p>Wprowadź angielską nazwę miasta i dwuliterowy kod ISO kraju. </p>

{% if weather %}

<canvas id="chart"></canvas>

<script>

const labels = {{ weather.time|tojson }};
const temps = {{ weather.temperature_2m|tojson }};

new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
        labels: labels,
        datasets: [{
            label: "Temperatura",
            data: temps
        }]
    },
     options: {
        backgroundColor:'rgba(158, 0, 135, 0.5)'
     }
});

</script>
{% else %}
    Brak danych.


{% endif %}

</body>
</html>
